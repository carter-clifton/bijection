<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="database.js"></script>
    <script defer src="script.js"></script>
</head>
<body class="bg-light">

    <div class="container my-5" style="max-width: 800px;">
        <h1 class="text-center mb-4 display-5 fw-bold text-primary">Mathematics Library</h1>
        
        <ul class="nav nav-pills mb-3 justify-content-center" id="libraryTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="all-tab" data-bs-toggle="pill" type="button">All Entries</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="favs-tab" data-bs-toggle="pill" type="button">
                    Favorites <span id="favCount" class="badge bg-danger ms-1">0</span>
                </button>
            </li>
        </ul>

        <input id="search" type="text" class="form-control form-control-lg shadow-sm mb-2" placeholder="Search definitions, theorems, lemmas...">
        <div id="searchInfo" class="text-muted small mb-4 ms-1"></div>

        <main id="results"></main>
    </div>

    <button id="topButton" class="btn btn-primary rounded-circle position-fixed shadow-lg" 
            style="bottom: 30px; right: 30px; width: 50px; height: 50px; display: none; z-index: 1030;" 
            title="Back to Top">
        <i class="bi bi-arrow-up"></i>
    </button>

</body>
</html>
